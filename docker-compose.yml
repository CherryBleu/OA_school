services:
  postgres:
    image: postgres:16-alpine
    container_name: oa-school-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: oa_school
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - oa_school_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d oa_school"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  oa_school_pgdata:
